<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cefet Shop - Detalhes</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/detalhes.css">
    <script src="src/main.js" defer></script>
</head>
<body>
    <header>
        <h1><a href="index.html">Cefet Shop</a></h1>
        <a href="carrinho.html" class="cart-icon">
            🛒 Carrinho <span class="badge">1</span>
        </a>
    </header>

    <main>
        <a href="index.html" class="btn btn-back">← Voltar para Loja</a>
        
        <div class="details-container">
            <img src="https://via.placeholder.com/400x400?text=Caneca+S.I." alt="Caneca SI">
            <div class="details-info">
                <h2>Caneca Sistemas de Informação</h2>
                <p><strong>Lançamento:</strong> 2026-1</p>
                <p>Caneca de cerâmica de alta qualidade, perfeita para acompanhar suas madrugadas programando.</p>
                
                <div class="price-container">
                    <span class="old-price">C$ 50.00</span>
                    <span class="price" style="font-size: 2rem;">C$ 40.00</span>
                    <span class="discount-tag">(20% OFF)</span>
                </div>

                <div style="margin-top: 1rem;">
                    <label for="qtd">Quantidade (Disponível: 8):</label>
                    <select id="qtd" style="padding: 0.5rem; font-size: 1rem;">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>

                <div class="actions">
                    <a href="#" class="btn" onclick="adicionarAoCarrinho(event)">Adicionar ao Carrinho</a>
                    <a href="carrinho.html" class="btn btn-secondary">Ir para o Carrinho</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
