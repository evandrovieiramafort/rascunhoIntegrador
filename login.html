<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cefet Shop - Login</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">
    <script src="src/main.js" defer></script>
</head>
<body>
    <header>
        <h1><a href="index.html">Cefet Shop</a></h1>
    </header>

    <main>
        <div class="login-container">
            <h2>Acessar Conta</h2>
            
            <div id="login-error" class="error-message">
                </div>

            <form onsubmit="realizarLogin(event)">
                <div class="form-group">
                    <label for="campo-login">Matrícula ou E-mail Institucional</label>
                    <input type="text" id="campo-login" placeholder="Ex: 2026101 ou aluno@cefet.br" required>
                </div>
                
                <div class="form-group">
                    <label for="campo-senha">Senha</label>
                    <input type="password" id="campo-senha" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn">Entrar</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                <p><strong>Dados para teste:</strong><br>
                Login: 2026101 ou aluno@cefet.br<br>
                Senha: 123</p>
            </div>
        </div>
    </main>
</body>
</html>
